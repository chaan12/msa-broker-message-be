spring.application.name=broker-message-be
server.port=8084

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://eureka-server:8761/eureka}
eureka.instance.prefer-ip-address=true

# Relational database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/broker_message}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:broker}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:broker}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true

# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:broker-message-be}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.ack-mode=record
spring.kafka.admin.auto-create=false

# Notification
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:25}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:false}

# Broker
broker.kafka.enabled=true
broker.schedulers.enabled=true
broker.retry.delay-ms=10000
broker.retry.batch-size=25
broker.topics.payments=payments_retry_jobs
broker.topics.orders=order_retry_jobs
broker.topics.products=product_retry_jobs
broker.topics.partitions=1
broker.topics.replicas=1
broker.notifications.default-recipient=${BROKER_DEFAULT_RECIPIENT:ops@example.com}
broker.notifications.from=${BROKER_NOTIFICATION_FROM:no-reply@broker-message-be.local}
broker.services.payments-url=${BROKER_PAYMENTS_URL:http://pagos-service:8083/pagos/procesar}
broker.services.orders-url=${BROKER_ORDERS_URL:http://ordenes-service:8082/ordenes}
broker.services.products-url=${BROKER_PRODUCTS_URL:http://productos-service:8081/productos}

management.endpoints.web.exposure.include=health,info
logging.level.com.example.broker_message_be=INFO
