spring.application.name=broker-message-be-test
spring.main.banner-mode=off

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

spring.datasource.url=jdbc:h2:mem:broker_message;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.admin.auto-create=false
spring.kafka.listener.auto-startup=false
broker.kafka.enabled=false
broker.schedulers.enabled=false
broker.retry.delay-ms=10000
broker.retry.batch-size=25
broker.topics.payments=payments_retry_jobs
broker.topics.orders=order_retry_jobs
broker.topics.products=product_retry_jobs
broker.topics.payment-received=payment_received_events
broker.topics.inventory-updates=inventory_update_events
broker.topics.order-status-changed=order_status_changed_events
broker.topics.partitions=1
broker.topics.replicas=1
broker.notifications.default-recipient=test@example.com
broker.notifications.from=no-reply@test.local
broker.services.payments-url=http://localhost:8083/pagos/procesar
broker.services.orders-url=http://localhost:8082/ordenes
broker.services.products-url=http://localhost:8081/productos
